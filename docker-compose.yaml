version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: restaurant-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mongo
      DB_PORT: 27017
      DB_NAME: ${DB_NAME:-restaurant}
      DB_USER: ${DB_USER:-admin}
      DB_PASS: ${DB_PASS:-secret}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - restaurant-net

  mongo:
    image: mongo:7-jammy
    container_name: restaurant-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS:-secret}
      MONGO_INITDB_DATABASE: ${DB_NAME:-restaurant}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - restaurant-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: restaurant-tests
    environment:
      NODE_ENV: test
    networks:
      - restaurant-net
    profiles:
      - test

volumes:
  mongo-data:
    driver: local

networks:
  restaurant-net:
    driver: bridge